<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Mason Rec Rays</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #0b6bcb, #06b6d4);
        color: #fff;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 16px;
        padding: 32px 28px;
        max-width: 420px;
        backdrop-filter: blur(6px);
      }
      h1 { margin: 0 0 8px; font-size: 1.5rem; }
      p { margin: 0 0 20px; opacity: 0.9; line-height: 1.5; }
      button {
        font: inherit;
        font-weight: 600;
        padding: 10px 20px;
        border-radius: 10px;
        border: 0;
        background: #fff;
        color: #0b6bcb;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card" role="alert">
      <h1>🐟 You're offline</h1>
      <p>
        Some features need a connection. Your cached schedule, news, and profile
        are still available once you're back in the app.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
